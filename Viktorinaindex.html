<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz: Did you have a good day? & Telling the Time</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html {
    --bg-light: #f4f8fe;
    --bg-lines: #d9e2f1;
    --card-bg: #ffffff;
    --text-dark: #2c3e50;
    --text-light: #5a6a7a;
    --accent: #3498db;
    --correct: #27ae60;
    --correct-bg: #e9f7ef;
    --incorrect: #e74c3c;
    --incorrect-bg: #fdedec;
  }
  
  body {
    font-family: 'Patrick Hand', cursive, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--bg-light);
    background-image:
      linear-gradient(var(--bg-lines) 1px, transparent 1px);
    background-size: 100% 2.2em; /* Spacing of notebook lines */
    padding: 16px;
    color: var(--text-dark);
  }

  .quiz-container {
    background-color: var(--card-bg);
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(44, 62, 80, 0.15);
    padding: 24px;
    border: 1px solid #e0e0e0;
  }

  /* Header: Progress and Score */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 16px;
    color: var(--text-light);
  }
  #score-text {
    font-weight: bold;
    color: var(--accent);
  }

  /* Question Area */
  #question-container {
    margin-bottom: 24px;
  }
  #question-text {
    font-size: 26px;
    line-height: 1.4;
    text-align: center;
  }
  .time-display {
    display: block;
    font-size: 48px;
    font-weight: bold;
    color: var(--accent);
    margin-top: 8px;
  }

  /* Answers */
  #answers-container {
    display: grid;
    gap: 12px;
  }
  .answer-btn {
    font-family: 'Patrick Hand', cursive, sans-serif;
    width: 100%;
    padding: 14px;
    font-size: 19px;
    text-align: left;
    background-color: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--text-dark);
  }
  .answer-btn:hover:not(:disabled) {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.1);
  }
  .answer-btn:disabled {
    cursor: not-allowed;
  }
  .answer-btn.correct {
    background-color: var(--correct-bg);
    border-color: var(--correct);
    color: var(--correct);
    font-weight: bold;
  }
  .answer-btn.incorrect {
    background-color: var(--incorrect-bg);
    border-color: var(--incorrect);
    color: var(--incorrect);
    font-weight: bold;
  }
  
  /* Shake animation for incorrect answer */
  .shake {
    animation: shake 0.5s ease-in-out;
  }
  @keyframes shake {
    10%, 90% { transform: translateX(-4px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }

  /* Controls */
  .controls {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .next-btn, .restart-btn {
    font-family: 'Patrick Hand', cursive, sans-serif;
    font-size: 18px;
    padding: 10px 25px;
    border: none;
    border-radius: 20px;
    background-color: var(--accent);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    transition: all 0.2s ease;
  }
  .next-btn:hover, .restart-btn:hover {
    background-color: #2980b9;
    transform: translateY(-2px);
  }

  /* Result Screen */
  #result-screen {
    text-align: center;
  }
  #result-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }
  #result-title {
    font-size: 28px;
    margin-bottom: 8px;
  }
  #final-score {
    font-size: 20px;
    color: var(--text-light);
    margin-bottom: 8px;
  }
  #grade-text {
    font-size: 22px;
    color: var(--accent);
    font-weight: bold;
    margin-bottom: 24px;
  }

  .hidden { display: none; }
</style>
</head>
<body>

  <div class="quiz-container">
    <!-- Quiz Screen -->
    <div id="quiz-screen">
      <div class="quiz-header">
        <span id="progress-text">Question 1 of 6</span>
        <span id="score-text">Score: 0</span>
      </div>
      <div id="question-container">
        <p id="question-text">Question text goes here</p>
      </div>
      <div id="answers-container">
        <!-- Answer buttons will be generated here -->
      </div>
      <div class="controls">
        <button id="next-btn" class="next-btn hidden">Next →</button>
      </div>
    </div>
    
    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <div id="result-icon">🎉</div>
      <h2 id="result-title">Quiz Complete!</h2>
      <p id="final-score">Your final score is 5 out of 6.</p>
      <p id="grade-text">Excellent!</p>
      <button id="restart-btn" class="restart-btn">Play Again</button>
    </div>
  </div>

<script>
const questions = [
  {
    question: "Did you watch TV yesterday?",
    answers: [
      { text: "Yes, I did.", correct: true },
      { text: "No, I not did.", correct: false },
      { text: "Yes, I do.", correct: false },
    ]
  },
  {
    question: "What time is it?",
    time: "7:15",
    answers: [
      { text: "It's quarter to seven.", correct: false },
      { text: "It's quarter past seven.", correct: true },
      { text: "It's half past seven.", correct: false },
    ]
  },
  {
    question: "Did your friend play football?",
    answers: [
      { text: "Yes, he did.", correct: true },
      { text: "No, he don't.", correct: false },
      { text: "Yes, he does.", correct: false },
    ]
  },
  {
    question: "What time is it?",
    time: "8:45",
    answers: [
      { text: "It's quarter past eight.", correct: false },
      { text: "It's eight o'clock.", correct: false },
      { text: "It's quarter to nine.", correct: true },
    ]
  },
  {
    question: "Did they have a good day?",
    answers: [
      { text: "No, they did.", correct: false },
      { text: "Yes, they has.", correct: false },
      { text: "No, they didn't.", correct: true },
    ]
  },
  {
    question: "What time is it?",
    time: "2:30",
    answers: [
      { text: "It's half past two.", correct: true },
      { text: "It's quarter past two.", correct: false },
      { text: "It's two o'clock.", correct: false },
    ]
  }
];

// DOM Elements
const quizScreen = document.getElementById('quiz-screen');
const resultScreen = document.getElementById('result-screen');
const questionTextEl = document.getElementById('question-text');
const answersContainerEl = document.getElementById('answers-container');
const progressTextEl = document.getElementById('progress-text');
const scoreTextEl = document.getElementById('score-text');
const nextBtn = document.getElementById('next-btn');
const restartBtn = document.getElementById('restart-btn');

// State
let currentQuestionIndex = 0;
let score = 0;

function startQuiz() {
  currentQuestionIndex = 0;
  score = 0;
  resultScreen.classList.add('hidden');
  quizScreen.classList.remove('hidden');
  nextBtn.classList.add('hidden');
  showQuestion();
}

function showQuestion() {
  resetState();
  const currentQuestion = questions[currentQuestionIndex];
  
  let questionHtml = currentQuestion.question;
  if (currentQuestion.time) {
    questionHtml += `<span class="time-display">${currentQuestion.time}</span>`;
  }
  questionTextEl.innerHTML = questionHtml;
  
  currentQuestion.answers.forEach(answer => {
    const button = document.createElement('button');
    button.innerText = answer.text;
    button.classList.add('answer-btn');
    if (answer.correct) {
      button.dataset.correct = answer.correct;
    }
    button.addEventListener('click', selectAnswer);
    answersContainerEl.appendChild(button);
  });
  
  progressTextEl.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
  scoreTextEl.innerText = `Score: ${score}`;
}

function resetState() {
  nextBtn.classList.add('hidden');
  while (answersContainerEl.firstChild) {
    answersContainerEl.removeChild(answersContainerEl.firstChild);
  }
}

function selectAnswer(e) {
  const selectedBtn = e.target;
  const isCorrect = selectedBtn.dataset.correct === 'true';

  if (isCorrect) {
    selectedBtn.classList.add('correct');
    score++;
    scoreTextEl.innerText = `Score: ${score}`;
  } else {
    selectedBtn.classList.add('incorrect');
    selectedBtn.classList.add('shake');
  }

  // Disable all buttons and show the correct answer
  Array.from(answersContainerEl.children).forEach(button => {
    if (button.dataset.correct === 'true') {
      button.classList.add('correct');
    }
    button.disabled = true;
  });

  // Show the next button
  if (questions.length > currentQuestionIndex + 1) {
    nextBtn.classList.remove('hidden');
  } else {
    // If it's the last question, show the results after a short delay
    setTimeout(showResults, 1000);
  }
}

function showResults() {
  quizScreen.classList.add('hidden');
  resultScreen.classList.remove('hidden');
  
  const finalScoreEl = document.getElementById('final-score');
  const gradeTextEl = document.getElementById('grade-text');
  const resultIconEl = document.getElementById('result-icon');
  
  finalScoreEl.innerText = `Your final score is ${score} out of ${questions.length}.`;
  
  let grade = '';
  let icon = '';
  
  if (score === questions.length) {
    grade = 'Excellent!';
    icon = '🏆';
  } else if (score >= questions.length / 2) {
    grade = 'Good job!';
    icon = '👍';
  } else {
    grade = 'Keep practicing!';
    icon = '💪';
  }
  
  gradeTextEl.innerText = grade;
  resultIconEl.innerText = icon;
}

nextBtn.addEventListener('click', () => {
  currentQuestionIndex++;
  showQuestion();
});

restartBtn.addEventListener('click', startQuiz);

// Start the quiz when the page loads
startQuiz();

</script>
</body>
</html>
